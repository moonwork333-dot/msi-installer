name: Build Watson RMM Agent MSI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download NSSM
        shell: pwsh
        run: |
          $NssmVersion = "2.26"
          $NssmUrl = "https://nssm.cc/release/nssm-$NssmVersion.zip"
          $NssmZip = "nssm-$NssmVersion.zip"
          $NssmDir = "nssm-extract"
          $InstallerDir = "agent/installer"
          
          Write-Host "Downloading NSSM $NssmVersion from $NssmUrl"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          (New-Object System.Net.WebClient).DownloadFile($NssmUrl, $NssmZip)
          
          Write-Host "Extracting NSSM"
          Expand-Archive -Path $NssmZip -DestinationPath $NssmDir -Force
          
          Write-Host "Copying nssm.exe to installer directory"
          if (Test-Path "$NssmDir/nssm-$NssmVersion/win64/nssm.exe") {
            Copy-Item "$NssmDir/nssm-$NssmVersion/win64/nssm.exe" "$InstallerDir/nssm.exe"
          } elseif (Test-Path "$NssmDir/nssm-$NssmVersion/win32/nssm.exe") {
            Copy-Item "$NssmDir/nssm-$NssmVersion/win32/nssm.exe" "$InstallerDir/nssm.exe"
          } else {
            throw "Could not find nssm.exe"
          }
          
          Write-Host "Cleaning up"
          Remove-Item $NssmZip -Force
          Remove-Item $NssmDir -Recurse -Force
          
          Write-Host "NSSM ready at $InstallerDir/nssm.exe"
      
      - name: Verify nssm.exe exists
        shell: cmd
        run: dir "agent\installer\nssm.exe"
      
      - name: Build MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          REM Build the WiX MSI
          heat dir . -o files.wxs -ag -var var.SourceDir -cg ProductFiles
          candle.exe Product.wxs files.wxs -out obj\ -dSourceDir=.
          light.exe -out WatsonRMMAgent.msi obj\Product.wixobj obj\files.wixobj -ext WixUIExtension
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v3
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
