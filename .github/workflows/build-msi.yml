name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
      
      - name: Clean installer directory
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          
          # Remove old executable
          if (Test-Path "$installerPath\peng-rmm-agent.exe") {
            Remove-Item "$installerPath\peng-rmm-agent.exe" -Force
            Write-Host "Removed old peng-rmm-agent.exe"
          }
          
          # Remove old service directory if exists
          if (Test-Path "$installerPath\service") {
            Remove-Item "$installerPath\service" -Recurse -Force
            Write-Host "Removed old service directory"
          }
      
      - name: Create service directory structure
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          $servicePath = "$installerPath\service"
          
          # Create service directory
          New-Item -ItemType Directory -Path $servicePath -Force | Out-Null
          
          # Copy service files
          Copy-Item "agent\service.js" "$servicePath\" -Force
          Copy-Item "agent\package.json" "$servicePath\" -Force
          Copy-Item "agent\config.json" "$servicePath\" -Force
          
          Write-Host "Copied service files to $servicePath"
          
          # Copy node_modules recursively
          Write-Host "Copying node_modules (this may take a moment)..."
          Copy-Item "agent\node_modules" "$servicePath\node_modules" -Recurse -Force
          Write-Host "node_modules copied successfully"
          
          # Create wrapper batch file
          $batContent = @"
@echo off
setlocal enabledelayedexpansion
cd /d %~dp0
node.exe service.js
"@
          
          Set-Content "$servicePath\run-service.bat" $batContent -Encoding ASCII
          Write-Host "Created run-service.bat"
          
          # Verify structure
          Write-Host "Service directory structure:"
          Get-ChildItem -Path $servicePath -Recurse | Select-Object -First 20 | Format-Table FullName
          
          $fileCount = (Get-ChildItem -Path $servicePath -Recurse -File).Count
          Write-Host "Total files in service directory: $fileCount"
          
          if (-not (Test-Path "$servicePath\service.js")) { exit 1 }
          if (-not (Test-Path "$servicePath\node_modules")) { exit 1 }
          Write-Host "Service directory verified successfully"
      
      - name: Harvest service directory with Heat
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Harvesting service directory...
          heat.exe dir service -o ServiceFiles.wxs -ag -srd -dr INSTALLFOLDER -cg ServiceFilesGroup -var var.ServiceSourceDir
          if errorlevel 1 (
            echo ERROR: Heat.exe failed
            exit /b 1
          )
          echo Heat completed successfully
          dir ServiceFiles.wxs
      
      - name: Compile WiX sources
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          echo Compiling Product.wxs...
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=. -dServiceSourceDir=service
          if errorlevel 1 (
            echo ERROR: Failed to compile Product.wxs
            exit /b 1
          )
          echo Compiling ServiceFiles.wxs...
          candle.exe -nologo ServiceFiles.wxs -out obj\ServiceFiles.wixobj -dServiceSourceDir=service
          if errorlevel 1 (
            echo ERROR: Failed to compile ServiceFiles.wxs
            exit /b 1
          )
          echo All WiX sources compiled successfully
      
      - name: Link MSI with service files
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Linking MSI...
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj obj\ServiceFiles.wixobj -ext WixUIExtension -dcl:high -reusecab
          if errorlevel 1 (
            echo ERROR: Failed to link MSI
            exit /b 1
          )
          echo MSI linked successfully
      
      - name: Verify MSI was created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI not created
            exit /b 1
          )
          echo MSI created successfully:
          dir WatsonRMMAgent.msi
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
