name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
      
      - name: Clean installer directory
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          
          if (Test-Path "$installerPath\peng-rmm-agent.exe") {
            Remove-Item "$installerPath\peng-rmm-agent.exe" -Force
          }
          
          if (Test-Path "$installerPath\service") {
            Remove-Item "$installerPath\service" -Recurse -Force
          }
      
      - name: Create service directory with all node_modules
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          $servicePath = "$installerPath\service"
          
          New-Item -ItemType Directory -Path $servicePath -Force | Out-Null
          
          Copy-Item "agent\service.js" "$servicePath\" -Force
          Copy-Item "agent\package.json" "$servicePath\" -Force
          Copy-Item "agent\config.json" "$servicePath\" -Force
          
          Write-Host "Copying node_modules..."
          Copy-Item "agent\node_modules" "$servicePath\node_modules" -Recurse -Force
          
          $batContent = "@echo off`r`nsetlocal enabledelayedexpansion`r`ncd /d %~dp0`r`nnode.exe service.js"
          Set-Content "$servicePath\run-service.bat" $batContent -Encoding ASCII
          
          $fileCount = (Get-ChildItem -Path $servicePath -Recurse -File).Count
          $sizeBytes = (Get-ChildItem -Path $servicePath -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $sizeMB = [Math]::Round($sizeBytes / 1MB, 2)
          
          Write-Host "Service directory created: $fileCount files, $sizeMB MB"
      
      - name: Compile Product.wxs
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=.
          if errorlevel 1 (
            echo ERROR: Product.wxs compilation failed
            exit /b 1
          )
      
      - name: Link MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj -ext WixUIExtension -dcl:high -reusecab
          if errorlevel 1 (
            echo ERROR: MSI linking failed
            exit /b 1
          )
      
      - name: Verify MSI was created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI not created
            exit /b 1
          )
          
          dir WatsonRMMAgent.msi
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
