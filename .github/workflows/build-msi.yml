name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
      
      - name: Clean installer directory (remove old files)
        shell: cmd
        run: |
          cd agent\installer
          del /Q peng-rmm-agent.exe 2>nul || echo peng-rmm-agent.exe not found
          if exist service rmdir /S /Q service
          echo Installer directory cleaned
      
      - name: Create service structure with proper copying
        shell: cmd
        run: |
          cd agent\installer
          mkdir service
          cd service
          copy ..\..\service.js .
          copy ..\..\package.json .
          copy ..\..\config.json .
          
          echo Copying node_modules (this may take a moment)...
          cd ..
          robocopy ..\node_modules service\node_modules /E /NP /NS /NC /NFL /NDL /NJH
          
          echo Verifying service directory:
          dir service
          
          if not exist service\service.js exit /b 1
          if not exist service\package.json exit /b 1
          if not exist service\node_modules exit /b 1
          echo Service directory verified successfully
      
      - name: Create service wrapper batch file
        shell: cmd
        working-directory: agent/installer/service
        run: |
          (
            echo @echo off
            echo setlocal enabledelayedexpansion
            echo cd /d %%~dp0
            echo node.exe service.js
          ) > run-service.bat
          echo run-service.bat created
      
      - name: Verify final service directory
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Final service directory contents:
          dir /S service | findstr /C:"service.js" /C:"package.json" /C:"run-service.bat" /C:"node_modules"
          echo.
          echo Checking file count:
          for /f %%A in ('dir /s /b service 2^>nul ^| find /c /v ""') do echo Found %%A files in service directory
      
      - name: Harvest service directory with Heat
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Harvesting service directory...
          heat.exe dir service -o ServiceFiles.wxs -ag -srd -dr INSTALLFOLDER -cg ServiceFilesGroup -var var.ServiceSourceDir
          if errorlevel 1 (
            echo ERROR: Heat.exe failed
            exit /b 1
          )
          echo Heat completed successfully
          echo Checking ServiceFiles.wxs was created:
          dir ServiceFiles.wxs
      
      - name: Compile WiX sources
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          echo Compiling Product.wxs...
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=. -dServiceSourceDir=service
          if errorlevel 1 (
            echo ERROR: Failed to compile Product.wxs
            exit /b 1
          )
          echo Compiling ServiceFiles.wxs...
          candle.exe -nologo ServiceFiles.wxs -out obj\ServiceFiles.wixobj -dServiceSourceDir=service
          if errorlevel 1 (
            echo ERROR: Failed to compile ServiceFiles.wxs
            exit /b 1
          )
          echo All WiX sources compiled successfully
      
      - name: Link MSI with service files
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Linking MSI...
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj obj\ServiceFiles.wixobj -ext WixUIExtension -dcl:high -reusecab
          if errorlevel 1 (
            echo ERROR: Failed to link MSI
            exit /b 1
          )
          echo MSI linked successfully
      
      - name: Verify MSI was created and contains service files
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI not created
            exit /b 1
          )
          echo MSI created successfully:
          dir WatsonRMMAgent.msi
          
          echo.
          echo Checking if peng-rmm-agent.exe is NOT in the installer:
          if exist peng-rmm-agent.exe (
            echo WARNING: Old executable still present!
            exit /b 1
          )
          echo Verified: Old executable removed
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
