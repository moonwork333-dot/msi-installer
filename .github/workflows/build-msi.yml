name: Build Watson RMM Agent and MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies
        working-directory: agent
        run: npm install
      
      - name: Install pkg (Node.js to EXE compiler)
        run: npm install -g pkg
      
      - name: Compile agent to EXE
        working-directory: agent
        run: |
          pkg service.js --targets win-x64 --output peng-rmm-agent.exe
          echo EXE created successfully
      
      - name: Copy files to installer directory
        shell: cmd
        run: |
          echo Copying files to installer directory...
          copy agent\peng-rmm-agent.exe agent\installer\
          copy agent\config.json agent\installer\
          echo Files copied successfully
      
      - name: Verify installer files exist
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Checking required files:
          if not exist peng-rmm-agent.exe echo ERROR: peng-rmm-agent.exe missing && exit /b 1
          if not exist config.json echo ERROR: config.json missing && exit /b 1
          if not exist nssm.exe echo ERROR: nssm.exe missing && exit /b 1
          if not exist setup.bat echo ERROR: setup.bat missing && exit /b 1
          if not exist install-service.bat echo ERROR: install-service.bat missing && exit /b 1
          if not exist uninstall-service.bat echo ERROR: uninstall-service.bat missing && exit /b 1
          if not exist license.rtf echo ERROR: license.rtf missing && exit /b 1
          echo All files verified successfully
          dir
      
      - name: Compile WiX sources
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Compiling WiX...
          candle.exe Product.wxs -out obj\ -dSourceDir=.
          if errorlevel 1 exit /b 1
          echo WiX compilation successful
      
      - name: Link MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Linking MSI with file embedding...
          light.exe -out WatsonRMMAgent.msi obj\Product.wixobj -ext WixUIExtension -dSourceDir=.
          if errorlevel 1 exit /b 1
          echo MSI linked successfully
      
      - name: Verify MSI created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi echo ERROR: MSI not created && exit /b 1
          dir WatsonRMMAgent.msi
          echo MSI created successfully
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
