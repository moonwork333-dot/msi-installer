name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
      
      - name: Prepare installer files
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          $sourceServicePath = "agent\service"
          $targetServicePath = "$installerPath\service-source"
          
          # Remove old service source if exists
          if (Test-Path $targetServicePath) {
            Remove-Item $targetServicePath -Recurse -Force
          }
          
          # Copy service directory to installer for packaging
          New-Item -ItemType Directory -Path $targetServicePath -Force | Out-Null
          Copy-Item "agent\service.js" "$targetServicePath\" -Force
          Copy-Item "agent\package.json" "$targetServicePath\" -Force
          Copy-Item "agent\config.json" "$targetServicePath\" -Force
          
          Write-Host "Copying node_modules to service-source..."
          Copy-Item "agent\node_modules" "$targetServicePath\node_modules" -Recurse -Force
          
          $fileCount = (Get-ChildItem -Path $targetServicePath -Recurse -File).Count
          $sizeBytes = (Get-ChildItem -Path $targetServicePath -Recurse -File | Measure-Object -Property Length -Sum).Sum
          $sizeMB = [Math]::Round($sizeBytes / 1MB, 2)
          
          Write-Host "Service files prepared: $fileCount files, $sizeMB MB"
      
      - name: Compile Product.wxs
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=.
          if errorlevel 1 (
            echo ERROR: Product.wxs compilation failed
            exit /b 1
          )
      
      - name: Link MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj -ext WixUIExtension -dcl:high -reusecab
          if errorlevel 1 (
            echo ERROR: MSI linking failed
            exit /b 1
          )
      
      - name: Verify MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi exit /b 1
          dir WatsonRMMAgent.msi
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
