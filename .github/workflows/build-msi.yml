name: Build Watson RMM Agent and MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies
        working-directory: agent
        run: npm install
      
      - name: Install pkg (Node.js to EXE compiler)
        run: npm install -g pkg
      
      - name: Compile agent to EXE
        working-directory: agent
        run: |
          pkg service.js --targets win-x64 --output peng-rmm-agent.exe
          echo EXE created successfully
      
      - name: Copy files to installer directory
        shell: cmd
        run: |
          echo Copying files to installer directory...
          copy agent\peng-rmm-agent.exe agent\installer\
          copy agent\config.json agent\installer\
          echo Files copied successfully
      
      - name: Verify all files exist before build
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Verifying all required files exist:
          for %%F in (peng-rmm-agent.exe config.json nssm.exe setup.bat install-service.bat uninstall-service.bat license.rtf) do (
            if not exist %%F (
              echo ERROR: %%F not found
              exit /b 1
            )
            echo OK: %%F
          )
          echo.
          echo All files present. Directory listing:
          dir /s
      
      - name: Build MSI with WiX
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Cleaning previous build...
          if exist obj rmdir /s /q obj
          if exist WatsonRMMAgent.msi del WatsonRMMAgent.msi
          
          echo.
          echo Compiling WiX...
          candle.exe -nologo Product.wxs -out obj\ -dSourceDir=.
          if errorlevel 1 (
            echo ERROR: candle.exe failed
            exit /b 1
          )
          
          echo.
          echo Linking MSI...
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj -ext WixUIExtension
          if errorlevel 1 (
            echo ERROR: light.exe failed
            exit /b 1
          )
          
          echo.
          echo MSI build completed successfully
      
      - name: Verify MSI was created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI file was not created
            exit /b 1
          )
          echo MSI created successfully:
          dir WatsonRMMAgent.msi
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
