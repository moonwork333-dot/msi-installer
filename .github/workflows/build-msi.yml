name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
      
      - name: Copy service files to installer
        shell: cmd
        run: |
          mkdir agent\installer\service
          copy agent\service.js agent\installer\service\
          copy agent\package.json agent\installer\service\
          copy agent\package-lock.json agent\installer\service\
          xcopy agent\node_modules agent\installer\service\node_modules\ /E /I /Y
          copy agent\config.json agent\installer\service\
      
      - name: Create service wrapper batch file
        shell: cmd
        working-directory: agent/installer/service
        run: |
          echo @echo off > run-service.bat
          echo cd /d %%~dp0 >> run-service.bat
          echo node.exe service.js >> run-service.bat
      
      - name: Verify all files in installer directory
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Checking installer directory contents:
          dir
          echo.
          echo Verifying service directory:
          dir service
          echo.
          echo Verifying critical files:
          if not exist service\service.js exit /b 1
          if not exist service\package.json exit /b 1
          if not exist service\node_modules exit /b 1
          if not exist service\run-service.bat exit /b 1
          if not exist nssm.exe exit /b 1
          if not exist install-service.bat exit /b 1
          if not exist setup-service.vbs exit /b 1
          echo All files verified
      
      - name: Compile Product.wxs
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=.
          if errorlevel 1 exit /b 1
      
      - name: Link MSI (with maximum compression)
        shell: cmd
        working-directory: agent/installer
        run: |
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj -ext WixUIExtension -dcl:high -reusecab
          if errorlevel 1 exit /b 1
      
      - name: Verify MSI was created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI not created
            exit /b 1
          )
          echo MSI created successfully:
          dir WatsonRMMAgent.msi
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
