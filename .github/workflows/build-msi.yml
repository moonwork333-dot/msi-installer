name: Build Watson RMM Agent and MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies
        working-directory: agent
        run: npm install
      
      - name: Install pkg (Node.js to EXE compiler)
        run: npm install -g pkg
      
      - name: Compile agent to EXE
        working-directory: agent
        run: |
          pkg service.js --targets win-x64 --output peng-rmm-agent.exe
          echo EXE created successfully
      
      - name: Create clean staging directory for MSI
        shell: cmd
        run: |
          mkdir staging
          copy agent\peng-rmm-agent.exe staging\
          copy agent\config.json staging\
          copy agent\installer\nssm.exe staging\
          copy agent\installer\setup.bat staging\
          copy agent\installer\install-service.bat staging\
          copy agent\installer\uninstall-service.bat staging\
          copy agent\installer\license.rtf staging\
          echo Staging directory created with all required files
      
      - name: Verify staging files
        shell: cmd
        run: |
          echo Staging directory contents:
          dir staging
      
      - name: Generate file list with heat.exe
        shell: cmd
        working-directory: agent/installer
        run: |
          REM Generate component list from staging directory
          heat dir ..\..\staging -o files.wxs -ag -var var.SourceDir -cg ProductFiles
          echo files.wxs generated
      
      - name: Compile WiX sources
        shell: cmd
        working-directory: agent/installer
        run: |
          candle.exe Product.wxs files.wxs -out obj\ -dSourceDir=..\..\staging
          echo WiX compiled successfully
      
      - name: Link MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          light.exe -out WatsonRMMAgent.msi obj\Product.wixobj obj\files.wixobj -ext WixUIExtension
          echo MSI linked successfully
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
