name: Build Watson RMM Agent and MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies
        working-directory: agent
        run: npm install
      
      - name: Install pkg (Node.js to EXE compiler)
        run: npm install -g pkg
      
      - name: Compile agent to EXE
        working-directory: agent
        run: |
          pkg service.js --targets win-x64 --output peng-rmm-agent.exe
          echo "EXE created successfully"
      
      - name: Copy compiled EXE to installer directory
        shell: cmd
        run: |
          copy agent\peng-rmm-agent.exe agent\installer\peng-rmm-agent.exe
          echo Agent EXE copied to installer directory
      
      - name: Copy config to installer directory
        shell: cmd
        run: |
          copy agent\config.json agent\installer\config.json
          echo Config copied to installer directory
      
      - name: Verify installer files
        shell: cmd
        run: |
          echo Verifying installer files:
          dir "agent\installer\peng-rmm-agent.exe"
          dir "agent\installer\config.json"
          dir "agent\installer\nssm.exe"
      
      - name: Build MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          REM Build the WiX MSI
          heat dir . -o files.wxs -ag -var var.SourceDir -cg ProductFiles
          candle.exe Product.wxs files.wxs -out obj\ -dSourceDir=.
          light.exe -out WatsonRMMAgent.msi obj\Product.wixobj obj\files.wixobj -ext WixUIExtension
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
