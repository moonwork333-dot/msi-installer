name: Build Watson RMM Agent MSI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify NSSM is present
        shell: cmd
        run: dir "agent\installer\nssm.exe"
      
      - name: Build MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          REM Build the WiX MSI
          heat dir . -o files.wxs -ag -var var.SourceDir -cg ProductFiles
          candle.exe Product.wxs files.wxs -out obj\ -dSourceDir=.
          light.exe -out WatsonRMMAgent.msi obj\Product.wixobj obj\files.wixobj -ext WixUIExtension
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
