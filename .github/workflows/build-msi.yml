name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
      
      - name: Clean installer directory
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          
          if (Test-Path "$installerPath\peng-rmm-agent.exe") {
            Remove-Item "$installerPath\peng-rmm-agent.exe" -Force
          }
          
          if (Test-Path "$installerPath\service") {
            Remove-Item "$installerPath\service" -Recurse -Force
          }
          
          if (Test-Path "$installerPath\ServiceFiles.wxs") {
            Remove-Item "$installerPath\ServiceFiles.wxs" -Force
          }
      
      - name: Create service directory structure
        shell: powershell
        run: |
          $installerPath = "agent\installer"
          $servicePath = "$installerPath\service"
          
          New-Item -ItemType Directory -Path $servicePath -Force | Out-Null
          
          Copy-Item "agent\service.js" "$servicePath\" -Force
          Copy-Item "agent\package.json" "$servicePath\" -Force
          Copy-Item "agent\config.json" "$servicePath\" -Force
          
          Write-Host "Copying node_modules..."
          Copy-Item "agent\node_modules" "$servicePath\node_modules" -Recurse -Force
          
          $batContent = "@echo off`r`nsetlocal enabledelayedexpansion`r`ncd /d %~dp0`r`nnode.exe service.js"
          Set-Content "$servicePath\run-service.bat" $batContent -Encoding ASCII
          
          $fileCount = (Get-ChildItem -Path $servicePath -Recurse -File).Count
          Write-Host "Service directory ready with $fileCount files"
          Write-Host "Directory size: $('{0:N2}' -f ((Get-ChildItem -Path $servicePath -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB)) MB"
      
      - name: Harvest service directory with Heat
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Starting heat.exe harvest...
          heat.exe dir service -o ServiceFiles.wxs -ag -srd -dr INSTALLFOLDER -cg ServiceFilesGroup -var var.ServiceSourceDir -v
          
          if errorlevel 1 (
            echo ERROR: Heat.exe failed with error code !errorlevel!
            echo Checking if service directory exists:
            dir service
            exit /b 1
          )
          
          echo Heat.exe completed successfully
          echo ServiceFiles.wxs created:
          dir ServiceFiles.wxs
          echo.
          echo First 50 lines of ServiceFiles.wxs:
          for /f "tokens=*" %%A in ('more +1 ServiceFiles.wxs ^| findstr /N "." ^| findstr /C:"^1:" /C:"^2:" /C:"^3:" /C:"^4:" /C:"^5:"') do echo %%A
      
      - name: Compile WiX sources
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          
          echo Compiling Product.wxs...
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=. -dServiceSourceDir=service -v
          if errorlevel 1 (
            echo ERROR: Product.wxs compilation failed
            exit /b 1
          )
          
          echo Compiling ServiceFiles.wxs...
          candle.exe -nologo ServiceFiles.wxs -out obj\ServiceFiles.wixobj -dServiceSourceDir=service -v
          if errorlevel 1 (
            echo ERROR: ServiceFiles.wxs compilation failed
            exit /b 1
          )
          
          echo All sources compiled successfully
      
      - name: Link MSI
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Linking MSI...
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj obj\ServiceFiles.wixobj -ext WixUIExtension -dcl:high -reusecab -v
          if errorlevel 1 (
            echo ERROR: MSI linking failed
            exit /b 1
          )
          echo MSI linked successfully
      
      - name: Verify MSI was created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI not created
            exit /b 1
          )
          
          echo MSI created successfully:
          dir WatsonRMMAgent.msi
          
          echo.
          echo MSI file size should be 5-10 MB (includes node_modules)
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
