name: Build Watson RMM Agent MSI Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies (production only)
        working-directory: agent
        run: |
          npm install --production --omit=optional
          npm prune --production
          dir node_modules
      
      - name: Install pkg globally (latest)
        run: npm install -g pkg
      
      - name: Compile agent to EXE (optimized)
        working-directory: agent
        run: |
          pkg service.js --targets win-x64 --output peng-rmm-agent.exe --compress Gzip --strip
          echo Compiled successfully
          dir peng-rmm-agent.exe
      
      - name: Copy compiled files to installer
        shell: cmd
        run: |
          copy agent\peng-rmm-agent.exe agent\installer\
          copy agent\config.json agent\installer\
      
      - name: Verify all files in installer directory
        shell: cmd
        working-directory: agent/installer
        run: |
          echo Checking installer directory contents:
          dir
          echo.
          echo Verifying critical files:
          if not exist peng-rmm-agent.exe exit /b 1
          if not exist config.json exit /b 1
          if not exist nssm.exe exit /b 1
          if not exist setup.bat exit /b 1
          if not exist install-service.bat exit /b 1
          if not exist uninstall-service.bat exit /b 1
          if not exist setup-service.vbs exit /b 1
          if not exist license.rtf exit /b 1
          echo All files verified
      
      - name: Compile Product.wxs
        shell: cmd
        working-directory: agent/installer
        run: |
          if exist obj rmdir /s /q obj
          mkdir obj
          candle.exe -nologo Product.wxs -out obj\Product.wixobj -dSourceDir=.
          if errorlevel 1 exit /b 1
      
      - name: Link MSI (with maximum compression)
        shell: cmd
        working-directory: agent/installer
        run: |
          light.exe -nologo -out WatsonRMMAgent.msi obj\Product.wixobj -ext WixUIExtension -dcl:high -reusecab
          if errorlevel 1 exit /b 1
      
      - name: Verify MSI was created
        shell: cmd
        working-directory: agent/installer
        run: |
          if not exist WatsonRMMAgent.msi (
            echo ERROR: MSI not created
            exit /b 1
          )
          echo MSI created successfully:
          dir WatsonRMMAgent.msi
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-msi
          path: agent/installer/WatsonRMMAgent.msi
