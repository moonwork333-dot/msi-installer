name: Build Watson RMM Agent Installer

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-and-msi.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install agent dependencies
        working-directory: agent
        run: npm install
      
      - name: Install pkg
        run: npm install -g pkg
      
      - name: Compile agent to EXE
        working-directory: agent
        run: |
          pkg service.js --targets win-x64 --output peng-rmm-agent.exe
          echo Agent compiled successfully
      
      - name: Copy files to staging
        shell: cmd
        run: |
          mkdir installer_staging
          copy agent\peng-rmm-agent.exe installer_staging\
          copy agent\config.json installer_staging\
          copy agent\installer\nssm.exe installer_staging\
          copy agent\installer\setup.bat installer_staging\
          copy agent\installer\install-service.bat installer_staging\
          copy agent\installer\uninstall-service.bat installer_staging\
          copy agent\installer\license.rtf installer_staging\
          copy agent\installer\WatsonRMMAgent-Installer.bat installer_staging\
          dir installer_staging
      
      - name: Create installer ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path installer_staging\* -DestinationPath WatsonRMMAgent-Installer.zip -Force
          Get-Item WatsonRMMAgent-Installer.zip | Select-Object FullName, Length
      
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: WatsonRMMAgent-Installer
          path: WatsonRMMAgent-Installer.zip
